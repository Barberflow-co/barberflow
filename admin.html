<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klipflow Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0D6EFD;--brand-light:#EBF3FF;--brand-dark:#0A56C9;
  --accent:#00C48C;--warn:#F59E0B;--danger:#EF4444;
  --gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;
  --gray-400:#94A3B8;--gray-500:#64748B;--gray-700:#334155;--gray-800:#1E293B;--gray-900:#0F172A;
}
body{font-family:'Inter',sans-serif;font-size:14px;background:var(--gray-50);color:var(--gray-800);-webkit-font-smoothing:antialiased}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--gray-900)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-family:'Sora',sans-serif;font-weight:800;font-size:22px;text-align:center;margin-bottom:8px}
.login-sub{text-align:center;font-size:13px;color:var(--gray-500);margin-bottom:28px}
.fi{width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:14px;outline:none;transition:border .15s}
.fi:focus{border-color:var(--brand)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:6px}
.btn-login{width:100%;background:var(--brand);color:#fff;padding:11px;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px;transition:background .15s}
.btn-login:hover{background:var(--brand-dark)}
.err-msg{background:#FEE2E2;color:#B91C1C;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}

/* MAIN */
#main{display:none;min-height:100vh}
header{background:var(--gray-900);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between}
.h-logo{font-family:'Sora',sans-serif;font-weight:800;font-size:16px;color:#fff;display:flex;align-items:center;gap:8px}
.h-mark{width:28px;height:28px;background:var(--brand);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:800}
.h-badge{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.h-logout{color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;border:none;background:none;transition:color .15s}
.h-logout:hover{color:#fff}

.container{max-width:1200px;margin:0 auto;padding:32px 24px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border:1px solid var(--gray-200);border-radius:12px;padding:20px}
.stat-val{font-family:'Sora',sans-serif;font-size:28px;font-weight:800;color:var(--gray-900)}
.stat-val.blue{color:var(--brand)}.stat-val.green{color:var(--accent)}.stat-val.orange{color:var(--warn)}.stat-val.red{color:var(--danger)}
.stat-label{font-size:12px;color:var(--gray-500);margin-top:4px}

/* FILTROS */
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-input{padding:8px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:13px;outline:none;width:240px}
.search-input:focus{border-color:var(--brand)}
.filter-btn{padding:7px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--gray-600);transition:all .15s}
.filter-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* TABLE */
.card{background:#fff;border:1px solid var(--gray-200);border-radius:12px;overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
.card-title{font-weight:700;font-size:14px;color:var(--gray-900)}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500);background:var(--gray-50);border-bottom:1px solid var(--gray-200)}
td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:var(--gray-50)}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-trial{background:#FEF3C7;color:#92400E}
.b-starter{background:#DBEAFE;color:#1E40AF}
.b-pro{background:#D1FAE5;color:#065F46}
.b-studio{background:#EDE9FE;color:#5B21B6}
.b-blocked{background:#FEE2E2;color:#991B1B}
.b-active{background:#D1FAE5;color:#065F46}

.user-name{font-weight:600;color:var(--gray-900)}
.user-email{font-size:12px;color:var(--gray-400)}

/* AÇÕES */
.action-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s;margin-right:4px}
.btn-detail{background:var(--brand-light);color:var(--brand)}.btn-detail:hover{background:var(--brand);color:#fff}
.btn-block{background:#FEE2E2;color:#B91C1C}.btn-block:hover{background:#EF4444;color:#fff}
.btn-unblock{background:#D1FAE5;color:#065F46}.btn-unblock:hover{background:#00C48C;color:#fff}
.btn-delete{background:#F1F5F9;color:#64748B}.btn-delete:hover{background:#EF4444;color:#fff}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:540px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-weight:700;font-size:15px}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400);line-height:1}
.modal-body{padding:24px}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.info-row:last-child{border:none}
.info-label{font-size:12px;color:var(--gray-500);font-weight:600}
.info-val{font-size:13px;color:var(--gray-800);font-weight:500}

/* EMPTY */
.empty{text-align:center;padding:48px;color:var(--gray-400)}
.empty-icon{font-size:36px;margin-bottom:12px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--gray-400);font-size:13px}

@media(max-width:768px){
  .container{padding:16px}
  .stats{grid-template-columns:repeat(2,1fr)}
  table{font-size:12px}
  th,td{padding:10px 12px}
  .filters{gap:8px}
  .search-input{width:100%}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">
      <span style="color:var(--brand)">Klip</span>flow
    </div>
    <div class="login-sub">Painel Administrativo</div>
    <div class="err-msg" id="err-msg"></div>
    <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="adm-email" placeholder="seu@email.com"></div>
    <div class="fg"><label class="fl">Senha</label><input class="fi" type="password" id="adm-pass" placeholder="••••••••"></div>
    <button class="btn-login" onclick="doLogin()">Entrar no painel →</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <header>
    <div class="h-logo">
      <div class="h-mark">K</div>
      Klipflow
      <span class="h-badge">Admin</span>
    </div>
    <button class="h-logout" onclick="doLogout()">Sair →</button>
  </header>

  <div class="container">
    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-val blue" id="st-total">—</div>
        <div class="stat-label">Total de contas</div>
      </div>
      <div class="stat-card">
        <div class="stat-val green" id="st-ativos">—</div>
        <div class="stat-label">Ativos (trial/pago)</div>
      </div>
      <div class="stat-card">
        <div class="stat-val orange" id="st-trial">—</div>
        <div class="stat-label">Em trial</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="st-pagos">—</div>
        <div class="stat-label">Pagos</div>
      </div>
      <div class="stat-card">
        <div class="stat-val red" id="st-bloq">—</div>
        <div class="stat-label">Bloqueados</div>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="filters">
      <input class="search-input" type="text" id="search" placeholder="🔍 Buscar por nome, email ou barbearia..." oninput="filtrar()">
      <button class="filter-btn active" onclick="setFiltro('todos',this)">Todos</button>
      <button class="filter-btn" onclick="setFiltro('trial',this)">Trial</button>
      <button class="filter-btn" onclick="setFiltro('pago',this)">Pagos</button>
      <button class="filter-btn" onclick="setFiltro('bloqueado',this)">Bloqueados</button>
      <button class="filter-btn" style="margin-left:auto;background:var(--brand);color:#fff;border-color:var(--brand)" onclick="carregarUsuarios()">↻ Atualizar</button>
    </div>

    <!-- TABELA -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Usuários cadastrados</div>
        <div style="font-size:12px;color:var(--gray-400)" id="count-label"></div>
      </div>
      <div id="tabela-wrap">
        <div class="loading">Carregando...</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL DETALHES -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-titulo">Detalhes do usuário</div>
      <button class="modal-close" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const SURL = 'https://owanynpsbutuhcaclkif.supabase.co';
const SKEY = 'sb_publishable_Hscuu9s2i8eBNe6JMss8_A_-ENUg0uo';

// Email do super admin — só esse pode entrar
const ADMIN_EMAIL = 'calderarimkt@gmail.com';

const sb = supabase.createClient(SURL, SKEY);
let todosUsuarios = [];
let filtroAtivo = 'todos';

// ── LOGIN ──────────────────────────────────────────
async function doLogin(){
  const email = document.getElementById('adm-email').value.trim();
  const pass = document.getElementById('adm-pass').value;
  const err = document.getElementById('err-msg');
  err.style.display = 'none';

  if(email !== ADMIN_EMAIL){
    err.textContent = 'Acesso restrito ao administrador.';
    err.style.display = 'block';
    return;
  }

  const {data, error} = await sb.auth.signInWithPassword({email, password: pass});
  if(error){
    err.textContent = 'Email ou senha incorretos.';
    err.style.display = 'block';
    return;
  }

  mostrarPainel();
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('main').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
}

function mostrarPainel(){
  document.getElementById('login').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  carregarUsuarios();
}

// ── CARREGAR USUÁRIOS ──────────────────────────────
async function carregarUsuarios(){
  document.getElementById('tabela-wrap').innerHTML = '<div class="loading">Carregando usuários...</div>';

  const {data: profiles, error} = await sb.from('profiles').select('*').order('created_at', {ascending: false});
  if(error){
    document.getElementById('tabela-wrap').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Erro ao carregar: ${error.message}</div>`;
    return;
  }

  // Busca contagem de clientes por usuário
  const {data: clientesCounts} = await sb.from('clientes').select('user_id');
  const countMap = {};
  (clientesCounts||[]).forEach(c => { countMap[c.user_id] = (countMap[c.user_id]||0) + 1; });

  // Busca contagem de agendamentos
  const {data: agCounts} = await sb.from('agendamentos').select('user_id').eq('status','finalizado');
  const agMap = {};
  (agCounts||[]).forEach(a => { agMap[a.user_id] = (agMap[a.user_id]||0) + 1; });

  todosUsuarios = (profiles||[]).map(p => ({
    ...p,
    clientes_count: countMap[p.id] || 0,
    ag_count: agMap[p.id] || 0
  }));

  // Stats
  const total = todosUsuarios.length;
  const bloqueados = todosUsuarios.filter(u => u.plano === 'bloqueado').length;
  const trial = todosUsuarios.filter(u => u.plano === 'trial').length;
  const pagos = todosUsuarios.filter(u => ['starter','pro','studio'].includes(u.plano)).length;
  const ativos = total - bloqueados;

  document.getElementById('st-total').textContent = total;
  document.getElementById('st-ativos').textContent = ativos;
  document.getElementById('st-trial').textContent = trial;
  document.getElementById('st-pagos').textContent = pagos;
  document.getElementById('st-bloq').textContent = bloqueados;

  renderTabela();
}

// ── FILTRO ──────────────────────────────────────────
function setFiltro(filtro, btn){
  filtroAtivo = filtro;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTabela();
}

function filtrar(){ renderTabela(); }

function getUsuariosFiltrados(){
  const busca = document.getElementById('search').value.toLowerCase();
  return todosUsuarios.filter(u => {
    const matchFiltro =
      filtroAtivo === 'todos' ||
      (filtroAtivo === 'trial' && u.plano === 'trial') ||
      (filtroAtivo === 'pago' && ['starter','pro','studio'].includes(u.plano)) ||
      (filtroAtivo === 'bloqueado' && u.plano === 'bloqueado');
    const matchBusca = !busca ||
      (u.nome||'').toLowerCase().includes(busca) ||
      (u.email||'').toLowerCase().includes(busca) ||
      (u.nome_barbearia||'').toLowerCase().includes(busca);
    return matchFiltro && matchBusca;
  });
}

// ── RENDER TABELA ────────────────────────────────────
function renderTabela(){
  const usuarios = getUsuariosFiltrados();
  document.getElementById('count-label').textContent = `${usuarios.length} usuário${usuarios.length !== 1 ? 's' : ''}`;

  if(!usuarios.length){
    document.getElementById('tabela-wrap').innerHTML = `<div class="empty"><div class="empty-icon">👤</div>Nenhum usuário encontrado</div>`;
    return;
  }

  const rows = usuarios.map(u => {
    const plano = u.plano || 'trial';
    const bloqueado = plano === 'bloqueado';
    const dataReg = u.created_at ? new Date(u.created_at).toLocaleDateString('pt-BR') : '—';
    const planoBadge = {
      trial: '<span class="badge b-trial">Trial</span>',
      starter: '<span class="badge b-starter">Starter</span>',
      pro: '<span class="badge b-pro">Pro</span>',
      studio: '<span class="badge b-studio">Studio</span>',
      bloqueado: '<span class="badge b-blocked">Bloqueado</span>',
    }[plano] || `<span class="badge b-trial">${plano}</span>`;

    const btnBloquear = bloqueado
      ? `<button class="action-btn btn-unblock" onclick="toggleBloquear('${u.id}','${u.nome}',false)">✓ Desbloquear</button>`
      : `<button class="action-btn btn-block" onclick="toggleBloquear('${u.id}','${u.nome}',true)">⊘ Bloquear</button>`;

    return `<tr>
      <td>
        <div class="user-name">${u.nome || 'Sem nome'}</div>
        <div class="user-email">${u.email || '—'}</div>
      </td>
      <td>${u.nome_barbearia || '—'}</td>
      <td>${planoBadge}</td>
      <td style="text-align:center">${u.clientes_count}</td>
      <td style="text-align:center">${u.ag_count}</td>
      <td>${dataReg}</td>
      <td>
        <button class="action-btn btn-detail" onclick="verDetalhes('${u.id}')">👁 Ver</button>
        ${btnBloquear}
        <button class="action-btn btn-delete" onclick="excluirUsuario('${u.id}','${u.nome}')">🗑</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tabela-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Usuário</th>
        <th>Barbearia</th>
        <th>Plano</th>
        <th style="text-align:center">Clientes</th>
        <th style="text-align:center">Atendimentos</th>
        <th>Cadastro</th>
        <th>Ações</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── BLOQUEAR / DESBLOQUEAR ───────────────────────────
async function toggleBloquear(id, nome, bloquear){
  const acao = bloquear ? 'bloquear' : 'desbloquear';
  if(!confirm(`Deseja ${acao} ${nome}?`)) return;

  const novoPlano = bloquear ? 'bloqueado' : 'trial';
  const {error} = await sb.from('profiles').update({plano: novoPlano}).eq('id', id);
  if(error){ alert('Erro: ' + error.message); return; }

  // Atualiza local
  const u = todosUsuarios.find(x => x.id === id);
  if(u) u.plano = novoPlano;
  renderTabela();
  carregarUsuarios();
}

// ── EXCLUIR ──────────────────────────────────────────
async function excluirUsuario(id, nome){
  if(!confirm(`⚠️ Excluir permanentemente a conta de ${nome}?\n\nIsso vai remover todos os dados: clientes, agendamentos, serviços, etc.\n\nEssa ação NÃO pode ser desfeita!`)) return;
  if(!confirm(`Confirme novamente: excluir ${nome}?`)) return;

  const {error} = await sb.from('profiles').delete().eq('id', id);
  if(error){ alert('Erro: ' + error.message); return; }

  todosUsuarios = todosUsuarios.filter(u => u.id !== id);
  renderTabela();
  carregarUsuarios();
}

// ── VER DETALHES ─────────────────────────────────────
async function verDetalhes(id){
  const u = todosUsuarios.find(x => x.id === id);
  if(!u) return;

  document.getElementById('modal-titulo').textContent = u.nome || 'Usuário';

  // Busca equipe
  const {data: equipe} = await sb.from('equipe').select('nome,permissao,email').eq('user_id', id);
  // Busca serviços
  const {data: servicos} = await sb.from('servicos').select('nome').eq('user_id', id).eq('ativo', true);

  const plano = u.plano || 'trial';
  const dataReg = u.created_at ? new Date(u.created_at).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

  const equipeLista = (equipe||[]).map(e => `${e.nome} (${e.permissao})`).join(', ') || 'Nenhum';
  const servicosLista = (servicos||[]).map(s => s.nome).join(', ') || 'Nenhum';

  document.getElementById('modal-body').innerHTML = `
    <div class="info-row"><span class="info-label">Nome</span><span class="info-val">${u.nome||'—'}</span></div>
    <div class="info-row"><span class="info-label">Email</span><span class="info-val">${u.email||'—'}</span></div>
    <div class="info-row"><span class="info-label">Telefone</span><span class="info-val">${u.telefone||'—'}</span></div>
    <div class="info-row"><span class="info-label">Barbearia</span><span class="info-val">${u.nome_barbearia||'—'}</span></div>
    <div class="info-row"><span class="info-label">Plano</span><span class="info-val">${plano}</span></div>
    <div class="info-row"><span class="info-label">Clientes cadastrados</span><span class="info-val">${u.clientes_count}</span></div>
    <div class="info-row"><span class="info-label">Atendimentos finalizados</span><span class="info-val">${u.ag_count}</span></div>
    <div class="info-row"><span class="info-label">Cadastrado em</span><span class="info-val">${dataReg}</span></div>
    <div class="info-row"><span class="info-label">ID</span><span class="info-val" style="font-size:11px;font-family:monospace">${u.id}</span></div>
    <div class="info-row"><span class="info-label">Equipe</span><span class="info-val">${equipeLista}</span></div>
    <div class="info-row"><span class="info-label">Serviços</span><span class="info-val">${servicosLista}</span></div>
    <div class="info-row"><span class="info-label">Slug da página</span><span class="info-val">${u.link_page ? JSON.parse(u.link_page).slug || '—' : '—'}</span></div>
    <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">
      ${u.plano === 'bloqueado'
        ? `<button class="action-btn btn-unblock" style="padding:8px 16px;font-size:13px" onclick="toggleBloquear('${u.id}','${u.nome}',false);fecharModal()">✓ Desbloquear</button>`
        : `<button class="action-btn btn-block" style="padding:8px 16px;font-size:13px" onclick="toggleBloquear('${u.id}','${u.nome}',true);fecharModal()">⊘ Bloquear</button>`}
      <select onchange="mudarPlano('${u.id}',this.value)" style="padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">
        <option value="">Mudar plano...</option>
        <option value="trial">Trial</option>
        <option value="starter">Starter</option>
        <option value="pro">Pro</option>
        <option value="studio">Studio</option>
      </select>
      <button class="action-btn btn-delete" style="padding:8px 16px;font-size:13px" onclick="excluirUsuario('${u.id}','${u.nome}');fecharModal()">🗑 Excluir conta</button>
    </div>`;

  document.getElementById('modal-bg').classList.add('open');
}

async function mudarPlano(id, plano){
  if(!plano) return;
  const u = todosUsuarios.find(x => x.id === id);
  if(!confirm(`Mudar plano de ${u?.nome} para "${plano}"?`)) return;
  const {error} = await sb.from('profiles').update({plano}).eq('id', id);
  if(error){ alert('Erro: '+error.message); return; }
  if(u) u.plano = plano;
  fecharModal();
  carregarUsuarios();
}

function fecharModal(){ document.getElementById('modal-bg').classList.remove('open'); }

// Verifica sessão ao carregar
(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session && session.user.email === ADMIN_EMAIL) mostrarPainel();
})();

// Enter no login
document.addEventListener('keydown', e => {
  if(e.key === 'Enter' && document.getElementById('login').style.display !== 'none') doLogin();
});
</script>
</body>
